name: monetra
description: "Offline. Private. Yours. Modern Personal Finance Workspace."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'
  flutter: ">=3.16.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  
  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Database & Persistence (Drift + SQLite)
  drift: ^2.16.0
  sqlite3_flutter_libs: ^0.5.20
  path_provider: ^2.1.2
  path: ^1.9.0

  # Data Utilities & Identifiers
  uuid: ^4.3.3
  intl: ^0.20.2
  equatable: ^2.0.5

  # UI & Design System
  google_fonts: ^6.1.0
  flutter_animate: ^4.5.0
  fl_chart: ^0.66.2
  cupertino_icons: ^1.0.6
  go_router: ^17.3.0
  drift_flutter: ^0.2.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  drift_dev: ^2.16.0
  build_runner: ^2.4.8
  sqlite3: ^2.9.4

flutter:
  uses-material-design: true
